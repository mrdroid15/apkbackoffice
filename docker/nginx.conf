user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /dev/stdout;
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 64M;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Trust proxy headers so Laravel sees https when Coolify terminates TLS upstream
    set_real_ip_from 0.0.0.0/0;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        add_header X-Frame-Options "SAMEORIGIN"      always;
        add_header X-Content-Type-Options "nosniff"  always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        # Static asset caching.
        # Important: fall through to /index.php when the file doesn't exist on
        # disk. Livewire 3 serves /livewire/livewire.min.js dynamically via a
        # PHP route — if we returned 404 here, the admin login form would
        # never get Livewire's JS and would silently fail.
        location ~* \.(?:css|js|woff2?|ttf|eot|ico|png|jpe?g|gif|svg|webp|map)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
            include fastcgi_params;
            fastcgi_read_timeout 120;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # Block hidden files, except .well-known (ACME)
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
